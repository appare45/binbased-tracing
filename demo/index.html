<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App - Item Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 24px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 16px;
            margin-bottom: 16px;
        }

        h2 {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            font-family: monospace;
        }

        button {
            border: 1px solid #333;
            background: none;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 14px;
            font-family: monospace;
        }

        button:hover {
            background-color: #eee;
        }

        button:disabled {
            color: #999;
            border-color: #999;
            cursor: not-allowed;
        }

        .item-list {
            list-style: none;
        }

        .item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 12px;
        }

        .item-id {
            font-weight: bold;
        }

        .message {
            margin-top: 8px;
            font-size: 14px;
        }

        .message.success {
            color: #1a5c1a;
        }

        .message.error {
            color: #8b0000;
        }

        .empty-state {
            color: #999;
            padding: 12px 0;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Item Manager</h1>

        <div class="card">
            <h2>ヘルスチェック</h2>
            <button onclick="checkHealth()">ステータス確認</button>
            <div id="healthStatus"></div>
        </div>

        <div class="card">
            <h2>アイテム作成</h2>
            <form id="createForm" onsubmit="createItem(event)">
                <div class="form-group">
                    <label for="itemValue">アイテムの値</label>
                    <input type="text" id="itemValue" placeholder="例: test item" required>
                </div>
                <button type="submit">作成</button>
            </form>
            <div id="createMessage"></div>
        </div>

        <div class="card">
            <h2>ID指定検索</h2>
            <form id="searchForm" onsubmit="searchItem(event)">
                <div class="form-group">
                    <label for="searchId">アイテムID</label>
                    <input type="number" id="searchId" placeholder="例: 1" min="1" required>
                </div>
                <button type="submit">検索</button>
            </form>
            <div id="searchResult"></div>
        </div>

        <div class="card">
            <h2>全アイテム一覧</h2>
            <button onclick="loadAllItems()">更新</button>
            <div id="itemsList"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function checkHealth() {
            const statusDiv = document.getElementById('healthStatus');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();

                if (data.status === 'ok') {
                    statusDiv.innerHTML = '<div class="message success">サーバーは正常に動作しています</div>';
                } else {
                    statusDiv.innerHTML = '<div class="message error">サーバーに問題があります</div>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="message error">サーバーに接続できません: ' + error.message + '</div>';
            }
        }

        async function createItem(event) {
            event.preventDefault();
            const messageDiv = document.getElementById('createMessage');
            const valueInput = document.getElementById('itemValue');
            const value = valueInput.value.trim();

            if (!value) {
                messageDiv.innerHTML = '<div class="message error">値を入力してください</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/items`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ value: value })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.innerHTML = `<div class="message success">アイテムを作成しました (ID: ${data.id})</div>`;
                    valueInput.value = '';
                    loadAllItems();
                } else {
                    messageDiv.innerHTML = `<div class="message error">エラー: ${data.error}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="message error">作成に失敗しました: ' + error.message + '</div>';
            }
        }

        async function searchItem(event) {
            event.preventDefault();
            const resultDiv = document.getElementById('searchResult');
            const idInput = document.getElementById('searchId');
            const id = idInput.value;

            try {
                const response = await fetch(`${API_BASE}/items/${id}`);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="message success">
                            <div class="item search-result">
                                <span class="item-id">ID: ${data.id}</span>
                                <span class="item-value">${data.value}</span>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="message error">${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="message error">検索に失敗しました: ' + error.message + '</div>';
            }
        }

        async function loadAllItems() {
            const listDiv = document.getElementById('itemsList');
            const refreshBtn = document.querySelector('button[onclick="loadAllItems()"]');
            if (refreshBtn) refreshBtn.disabled = true;
            listDiv.innerHTML = '<div class="empty-state">更新中...</div>';

            try {
                const idsRes = await fetch(`${API_BASE}/items`);
                const ids = await idsRes.json();

                if (!idsRes.ok) {
                    listDiv.innerHTML = '<div class="message error">読み込みに失敗しました</div>';
                    return;
                }

                if (ids.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">アイテムがありません</div>';
                    return;
                }

                const items = await Promise.all(
                    ids.map(id => fetch(`${API_BASE}/items/${id}`).then(r => r.json()))
                );

                const itemsHTML = items.map(item => `
                    <li class="item">
                        <span class="item-id">ID: ${item.id}</span>
                        <span class="item-value">${item.value}</span>
                    </li>
                `).join('');
                listDiv.innerHTML = `<ul class="item-list">${itemsHTML}</ul>`;
            } catch (error) {
                listDiv.innerHTML = '<div class="message error">読み込みに失敗しました: ' + error.message + '</div>';
            } finally {
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        window.onload = function () {
            checkHealth();
            loadAllItems();
        };
    </script>
</body>

</html>
